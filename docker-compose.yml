version: '3.8'

services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      - LLAMA_API_URL_1=http://llama-cpp-1:8080
      - LLAMA_API_URL_2=http://llama-cpp-2:8080
      - LLAMA_API_URL_3=http://llama-cpp-3:8080
      - LLAMA_API_URL_4=http://llama-cpp-4:8080
      - NODE_ENV=production
    networks:
      - llama-net
    depends_on:
      - llama-cpp-1
      - llama-cpp-2
      - llama-cpp-3
      - llama-cpp-4

  llama-cpp-1:
    image: ${LLAMA_CPP_IMAGE}
    env_file: .env
    ports:
      - "8080:8080"
    networks:
      - llama-net
    volumes:
      - llama_models:/root/.cache/huggingface
    command: >
      --hf-repo ${HF_REPO_1}
      --hf-file ${HF_FILE_1}
      --port 8080
      --host 0.0.0.0
    cpuset: "0-31"

  llama-cpp-2:
    image: ${LLAMA_CPP_IMAGE}
    env_file: .env
    ports:
      - "8081:8080"
    networks:
      - llama-net
    volumes:
      - llama_models:/root/.cache/huggingface
    command: >
      --hf-repo ${HF_REPO_2}
      --hf-file ${HF_FILE_2}
      --port 8080
      --host 0.0.0.0
    cpuset: "32-63"

  llama-cpp-3:
    image: ${LLAMA_CPP_IMAGE}
    env_file: .env
    ports:
      - "8082:8080"
    networks:
      - llama-net
    volumes:
      - llama_models:/root/.cache/huggingface
    command: >
      --hf-repo ${HF_REPO_3}
      --hf-file ${HF_FILE_3}
      --port 8080
      --host 0.0.0.0
    cpuset: "64-95"

  llama-cpp-4:
    image: ${LLAMA_CPP_IMAGE}
    env_file: .env
    ports:
      - "8083:8080"
    networks:
      - llama-net
    volumes:
      - llama_models:/root/.cache/huggingface
    command: >
      --hf-repo ${HF_REPO_4}
      --hf-file ${HF_FILE_4}
      --port 8080
      --host 0.0.0.0
    cpuset: "96-127"

networks:
  llama-net:
    driver: bridge

volumes:
  llama_models:
